<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>TO DO LIST</h1>
    <div class="main">
      <div class="days">
        <h2>DAYS</h2>
        <p>Monday</p>
        <p>Tuesday</p>
        <p>Wednesday</p>
        <p>Thursday</p>
        <p>Friday</p>
        <p>Saturday</p>
        <p>Sunday</p>
      </div>
      <div>
        <h2>TASKS</h2>
        <div class="tasks">
          <div class="monday taskClass"></div>
          <div class="tuesday taskClass"></div>
          <div class="wednesday taskClass"></div>
          <div class="thursday taskClass"></div>
          <div class="friday taskClass"></div>
          <div class="saturday taskClass"></div>
          <div class="sunday taskClass"></div>
        </div>
      </div>
      <div class="input">
        <input class="inp1" type="text" placeholder="Day" />
        <input class="inp2" type="text" placeholder="Task name" />
        <div class="btns">
          <button class="btn1">ADD TASK</button>
          <button class="btn2">DELETE TASK</button>
        </div>
      </div>
    </div>
  </body>
  <script src="script.js"></script>
</html>
